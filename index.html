<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>NepalStudy</title>
  <meta name="theme-color" content="#a5161c" />
  <meta name="description" content="NepalStudy - Kathmandu red Nepali grammar card app." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="src/app.css" />
</head>
<body>
  <main class="app" id="app">
    <div class="prayer-flags" aria-hidden="true">
      <span class="flag"></span><span class="flag"></span><span class="flag"></span><span class="flag"></span>
      <span class="flag"></span><span class="flag"></span><span class="flag"></span><span class="flag"></span>
    </div>
    <div class="top-zone" aria-hidden="true"></div>
    <section class="deck-wrap" id="deckWrap"><div class="deck" id="deck"></div></section>
    <button class="hotspot left" id="grammarBtn" type="button">文</button>
    <button class="hotspot right" id="wordBtn" type="button">語</button>
    <div class="panel-backdrop" id="panelBackdrop"></div>
    <aside class="side-panel left-panel" id="grammarPanel" aria-label="grammar map"></aside>
    <aside class="side-panel right-panel" id="wordPanel" aria-label="word map"></aside>
  </main>
  <script src="src/cards.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
